<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <base href="/" />
    <title>ShowPlay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/ChocoCooper/Showplay@main/Sevarothz.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/ChocoCooper/ChatBot/refs/heads/main/favicon.ico?token=GHSAT0AAAAAADVXDVOIW7QNEYJX2DGIQY7A2NJEAZQ">
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/ChocoCooper/Showplay/refs/heads/main/apple-touch-icon.png">
    <link rel="manifest" href="https://raw.githubusercontent.com/ChocoCooper/Showplay/refs/heads/main/manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2af598',
                        dark: '#101010',
                        card: '#1a1a1a'
                    },
                    fontFamily: { sans: ['Lexend', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <ul class="sidebar-nav">
                <li class="active" data-section="home"><i class="fas fa-home"></i><span>Home</span></li>
                <li data-section="search"><i class="fas fa-search"></i><span>Search</span></li>
                <li data-section="library"><i class="fa-solid fa-box-archive"></i><span>Library</span></li>
            </ul>
        </nav>

        <div class="main-content">
            <div class="container" id="homepage">
                <div class="main-title-container">
                    <img src="https://raw.githubusercontent.com/ChocoCooper/Showplay/refs/heads/main/showplay-text.png" alt="Showplay" class="main-title">
                </div>

                <div class="preview-section" id="previewSection">
                    <div class="preview-items-container" id="previewItemsContainer"></div>
                    <button class="slider-arrow left" onclick="navigatePreview('left')"><i class="fas fa-chevron-left"></i></button>
                    <button class="slider-arrow right" onclick="navigatePreview('right')"><i class="fas fa-chevron-right"></i></button>
                </div>

                <div class="media-slider-section" data-type="movie">
                    <div class="slider-header">
                        <h2 class="slider-title">Trending Movies</h2>
                    </div>
                    <div class="slider-wrapper">
                        <button class="slider-arrow left" onclick="scrollSlider('moviesSliderContainer', 'left')"><i class="fas fa-chevron-left"></i></button>
                        <div class="poster-slider" id="moviesSliderContainer"></div>
                        <button class="slider-arrow right" onclick="scrollSlider('moviesSliderContainer', 'right')"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="media-slider-section" data-type="tv">
                    <div class="slider-header">
                        <h2 class="slider-title">Trending Shows</h2>
                    </div>
                    <div class="slider-wrapper">
                        <button class="slider-arrow left" onclick="scrollSlider('tvSliderContainer', 'left')"><i class="fas fa-chevron-left"></i></button>
                        <div class="poster-slider" id="tvSliderContainer"></div>
                        <button class="slider-arrow right" onclick="scrollSlider('tvSliderContainer', 'right')"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="media-slider-section" data-type="anime">
                    <div class="slider-header">
                        <h2 class="slider-title">Trending Anime</h2>
                    </div>
                    <div class="slider-wrapper">
                        <button class="slider-arrow left" onclick="scrollSlider('animeSliderContainer', 'left')"><i class="fas fa-chevron-left"></i></button>
                        <div class="poster-slider" id="animeSliderContainer"></div>
                        <button class="slider-arrow right" onclick="scrollSlider('animeSliderContainer', 'right')"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="media-slider-section" data-type="kdrama">
                    <div class="slider-header">
                        <h2 class="slider-title">Trending K-Drama</h2>
                    </div>
                    <div class="slider-wrapper">
                        <button class="slider-arrow left" onclick="scrollSlider('kdramaSliderContainer', 'left')"><i class="fas fa-chevron-left"></i></button>
                        <div class="poster-slider" id="kdramaSliderContainer"></div>
                        <button class="slider-arrow right" onclick="scrollSlider('kdramaSliderContainer', 'right')"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="media-slider-section" data-type="cdrama">
                    <div class="slider-header">
                        <h2 class="slider-title">Trending C-Drama</h2>
                    </div>
                    <div class="slider-wrapper">
                        <button class="slider-arrow left" onclick="scrollSlider('cdramaSliderContainer', 'left')"><i class="fas fa-chevron-left"></i></button>
                        <div class="poster-slider" id="cdramaSliderContainer"></div>
                        <button class="slider-arrow right" onclick="scrollSlider('cdramaSliderContainer', 'right')"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
        <div id="toastNotification" class="toast-notification"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
