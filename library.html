<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <base href="/" />
    <title>ShowPlay - Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2af598',
                        dark: '#101010',
                        card: '#1a1a1a'
                    },
                    fontFamily: { sans: ['Lexend', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <ul class="sidebar-nav">
                <li data-section="home"><i class="fas fa-home"></i><span>Home</span></li>
                <li data-section="search"><i class="fas fa-search"></i><span>Search</span></li>
                <li class="active" data-section="library"><i class="fa-solid fa-box-archive"></i><span>Library</span></li>
            </ul>
        </nav>

        <div class="main-content">
            <div class="container" id="homepage">
                <div class="library-section" id="librarySection" style="display: block;">
                    <div class="watchlist-section">
                        <div class="slider-header">
                            <h2 class="slider-title">Watchlist</h2>
                        </div>
                        <div class="poster-slider" id="watchlistSlider"></div>
                    </div>
                    <div class="history-section">
                        <div class="slider-header">
                            <h2 class="slider-title">History</h2>
                        </div>
                        <div class="poster-slider" id="historySlider"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="toastNotification" class="toast-notification"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
