<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <base href="/" />
    <title>ShowPlay - Watch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2af598',
                        dark: '#101010',
                        card: '#1a1a1a'
                    },
                    fontFamily: { sans: ['Lexend', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <ul class="sidebar-nav">
                <li data-section="home"><i class="fas fa-home"></i><span>Home</span></li>
                <li data-section="search"><i class="fas fa-search"></i><span>Search</span></li>
                <li data-section="library"><i class="fa-solid fa-box-archive"></i><span>Library</span></li>
            </ul>
        </nav>

        <div class="main-content">
            <div class="video-page" id="videoPage" style="display: block;">
                <div class="video-header">
                    <button class="back-btn" aria-label="Go back"><i class="fas fa-arrow-left"></i></button>
                    <p class="media-title" id="videoMediaTitle"></p>
                </div>
                <div class="video-wrapper">
                    <iframe id="videoFrame" src="" allowfullscreen aria-label="Video Player"></iframe>
                </div>
                <div class="selector-container" id="selectorContainer">
                    <div class="server-selector">
                        <div class="server-buttons" id="serverGrid"></div>
                        <div class="video-actions">
                            <button class="action-btn watchlist" id="watchlistBtn" aria-label="Add to watchlist"><i class="fas fa-plus"></i> <span>Watchlist</span></button>
                            <a class="action-btn download" id="downloadBtn" href="#" target="_blank" aria-label="Download media"><i class="fa-solid fa-download"></i> <span>Download</span></a>
                        </div>
                    </div>
                    <div class="season-episode-selector" id="seasonEpisodeSelector" style="display: none;">
                        <div class="selector-title">Seasons & Episodes</div>
                        <div class="season-episode-accordion" id="seasonEpisodeAccordion"></div>
                    </div>
                    <div class="media-details bg-[#1a1a1a] rounded-xl p-5 md:p-6 mt-6 shadow-xl border border-white/5" id="mediaDetails" style="display: none;">
                        <div class="media-details-container flex flex-col md:flex-row gap-6">
                            <div class="media-details-poster flex-shrink-0 w-[140px] md:w-[180px] relative rounded-xl overflow-hidden shadow-lg">
                                <img src="" alt="Media Poster" id="mediaPoster" class="w-full h-auto object-cover transition-opacity duration-500 opacity-0">
                                <span class="rating-badge absolute top-2 right-2 bg-black/70 backdrop-blur-md text-white px-3 py-1 rounded-lg font-bold flex items-center gap-1" id="mediaRatingBadge"><i class="fas fa-star text-yellow-400"></i><span class="rating-value"></span></span>
                            </div>
                            <div class="media-details-content flex-1">
                                <h3 id="mediaDetailsTitle" class="title text-2xl md:text-3xl font-bold text-white mb-2"></h3>
                                <p id="mediaYearGenre" class="year-genre text-gray-300 font-medium mb-4 text-base"></p>
                                <p id="mediaPlot" class="plot text-gray-300 leading-relaxed text-sm md:text-base"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="toastNotification" class="toast-notification"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
